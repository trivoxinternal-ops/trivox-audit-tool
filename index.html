<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Trivox AI — Automation Audit</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Tokens ─────────────────────────────────────────────────── */
    :root {
      --blue: #2E61FE;
      --cyan: #00F0FF;
      --bg: #050508;
      --card: #111111;
      --card-alt: #1A1A1A;
      --border: #2A2A2A;
      --text: #E8E8E8;
      --text-muted: #777777;
      --text-dim: #999999;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
      --gradient: linear-gradient(135deg, #2E61FE 0%, #00F0FF 100%);
      --radius: 14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Sora', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body { overflow-x: hidden; }

    /* ── Particle Grid Background ──────────────────────────────── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Top Progress Bar ──────────────────────────────────────── */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #1a1a1a;
      z-index: 100;
    }

    .top-bar-fill {
      height: 100%;
      background: var(--gradient);
      box-shadow: 0 0 12px rgba(0, 240, 255, 0.4), 0 0 4px rgba(0, 240, 255, 0.2);
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      border-radius: 0 2px 2px 0;
    }

    /* ── Shell ──────────────────────────────────────────────────── */
    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      position: relative;
      z-index: 50;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .logo-text .t1 { color: #fff; }
    .logo-text .t2 {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-badge {
      font-size: 10px;
      font-weight: 600;
      color: var(--cyan);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 20px;
      background: rgba(0, 240, 255, 0.04);
    }

    /* ── Question Screen ───────────────────────────────────────── */
    .q-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
      position: relative;
      background: radial-gradient(ellipse at 50% 40%, rgba(46,97,254,0.12) 0%, rgba(0,240,255,0.05) 40%, transparent 70%);
    }

    .q-container {
      width: 100%;
      max-width: 680px;
      position: relative;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(0, 240, 255, 0.25);
      border-radius: 24px;
      padding: 60px 48px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 80px rgba(46, 97, 254, 0.15), 0 0 30px rgba(0, 240, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .q-counter {
      position: absolute;
      top: 24px;
      right: 32px;
      font-size: 13px;
      font-weight: 300;
      color: #333;
      letter-spacing: 0.08em;
    }

    .q-counter .cur {
      font-size: 1.4rem;
      font-weight: 800;
      color: #00F0FF;
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
    }

    .q-text {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.25;
      background: linear-gradient(135deg, #ffffff 60%, #00F0FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 36px;
    }

    .q-input-wrap {
      position: relative;
    }

    .q-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 12px;
      padding: 18px 20px;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      color: #fff;
      outline: none;
      resize: none;
      line-height: 1.6;
      transition: all 0.3s ease;
    }

    .q-input:focus {
      border-color: rgba(0, 240, 255, 0.7);
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.1), 0 0 40px rgba(0, 240, 255, 0.12);
      outline: none;
    }

    .q-input::placeholder { color: #555; }

    textarea.q-input { min-height: 120px; }

    .q-hint {
      font-size: 12px;
      color: #555;
      margin-top: 12px;
      line-height: 1.5;
    }

    .q-actions {
      margin-top: 32px;
      display: flex;
      gap: 12px;
    }

    .btn-next {
      flex: 1;
      padding: 16px 28px;
      background: var(--gradient);
      border: none;
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(46, 97, 254, 0.25);
    }

    .btn-next:hover {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(46, 97, 254, 0.35);
    }

    .btn-next:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-back {
      padding: 16px 24px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-back:hover { border-color: #444; color: #888; }

    /* ── Transitions ───────────────────────────────────────────── */
    .view-enter {
      animation: slideIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .view-exit {
      animation: slideOut 0.2s ease both;
    }

    @keyframes slideOut {
      to { opacity: 0; transform: translateY(-15px); }
    }

    /* ── Lead Form ─────────────────────────────────────────────── */
    .lead-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
    }

    .lead-card {
      width: 100%;
      max-width: 520px;
      background: rgba(17, 17, 17, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px;
    }

    .lead-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0, 240, 255, 0.06);
      border: 1px solid rgba(0, 240, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .lead-card h2 {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .lead-card .sub {
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .lead-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .lead-fields .full { grid-column: 1 / -1; }

    .lf label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .lf input {
      width: 100%;
      background: rgba(26, 26, 26, 0.9);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .lf input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0, 240, 255, 0.08), 0 0 16px rgba(0, 240, 255, 0.05);
    }

    .lf input::placeholder { color: #444; }

    .lead-submit {
      margin-top: 28px;
    }

    .lead-submit .btn-next { width: 100%; }

    .lead-back {
      margin-top: 14px;
      text-align: center;
    }

    .lead-back button {
      background: none;
      border: none;
      color: #555;
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .lead-back button:hover { color: #888; }

    /* ── Loading Overlay ───────────────────────────────────────── */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .scan-lines {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .scan-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 240, 255, 0.08) 50%, transparent 100%);
      animation: scanMove 3s ease-in-out infinite;
    }

    .scan-line:nth-child(1) { top: 20%; animation-delay: 0s; }
    .scan-line:nth-child(2) { top: 45%; animation-delay: 0.8s; }
    .scan-line:nth-child(3) { top: 70%; animation-delay: 1.6s; }

    @keyframes scanMove {
      0%, 100% { opacity: 0; transform: translateX(-100%); }
      50% { opacity: 1; transform: translateX(100%); }
    }

    .loading-pulse {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      position: relative;
      margin-bottom: 40px;
    }

    .loading-pulse::before,
    .loading-pulse::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .loading-pulse::before {
      border-top-color: var(--cyan);
      border-right-color: var(--cyan);
      animation: spin 1.2s linear infinite;
    }

    .loading-pulse::after {
      border-bottom-color: var(--blue);
      border-left-color: var(--blue);
      animation: spin 1.2s linear infinite reverse;
      inset: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-pulse .inner-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      margin: -6px 0 0 -6px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .loading-status {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      text-align: center;
      min-height: 28px;
      position: relative;
      z-index: 1;
    }

    .loading-sub {
      font-size: 13px;
      color: #444;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .loading-progress {
      width: 200px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 32px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .loading-progress-fill {
      height: 100%;
      background: var(--gradient);
      border-radius: 1px;
      transition: width 0.8s ease;
    }

    /* ── Error ─────────────────────────────────────────────────── */
    .error-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .error-card {
      text-align: center;
      max-width: 440px;
      background: rgba(17, 17, 17, 0.85);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 36px;
    }

    .error-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 22px;
      color: var(--danger);
    }

    .error-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .error-card p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.6; }

    /* ── REPORT DASHBOARD ──────────────────────────────────────── */
    .report {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* Score Hero */
    .score-hero {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .score-ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      margin: 0 auto 24px;
    }

    .score-ring-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .score-ring-bg {
      fill: none;
      stroke: var(--card-alt);
      stroke-width: 8;
    }

    .score-ring-fill {
      fill: none;
      stroke: url(#scoreGrad);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 502;
      stroke-dashoffset: 502;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-number {
      font-size: 3rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .score-of {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .score-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 8px;
    }

    .score-summary {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.7;
      max-width: 600px;
      margin: 0 auto;
    }

    /* KPI Row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 20px;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .kpi-card:hover {
      border-color: rgba(46, 97, 254, 0.3);
      box-shadow: 0 0 30px rgba(46, 97, 254, 0.06);
    }

    .kpi-value {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .kpi-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    /* Section Title */
    .section-title {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gradient);
    }

    /* Area Scores */
    .areas-section {
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .area-bars {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .area-row {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
    }

    .area-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .area-name { font-size: 13px; font-weight: 600; }

    .area-score-num { font-size: 13px; font-weight: 700; color: var(--cyan); }

    .area-track {
      width: 100%;
      height: 6px;
      background: var(--card-alt);
      border-radius: 3px;
      overflow: hidden;
    }

    .area-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--gradient);
      transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* Opportunities */
    .opps-section {
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .opp-cards { display: grid; gap: 14px; }

    .opp-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      transition: border-color 0.3s;
    }

    .opp-card:hover { border-color: rgba(46, 97, 254, 0.3); }

    .opp-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .opp-name { font-size: 14px; font-weight: 700; }
    .opp-badges { display: flex; gap: 6px; }

    .badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .badge-easy { background: rgba(34, 197, 94, 0.1); color: #22C55E; border: 1px solid rgba(34, 197, 94, 0.25); }
    .badge-medium { background: rgba(245, 158, 11, 0.1); color: #F59E0B; border: 1px solid rgba(245, 158, 11, 0.25); }
    .badge-complex { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.25); }
    .badge-high { background: rgba(46, 97, 254, 0.1); color: var(--blue); border: 1px solid rgba(46, 97, 254, 0.25); }
    .badge-med-impact { background: rgba(0, 240, 255, 0.08); color: var(--cyan); border: 1px solid rgba(0, 240, 255, 0.2); }
    .badge-low { background: rgba(119, 119, 119, 0.1); color: #999; border: 1px solid rgba(119, 119, 119, 0.25); }

    .opp-hours { font-size: 12px; color: var(--cyan); font-weight: 600; margin-bottom: 6px; }

    .opp-desc { font-size: 13px; color: var(--text-muted); line-height: 1.65; }

    /* Quick Wins */
    .wins-section {
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .wins-list { display: flex; flex-direction: column; gap: 10px; }

    .win-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
    }

    .win-bullet {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid rgba(0, 240, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--cyan);
      flex-shrink: 0;
      margin-top: 1px;
    }

    .win-text { font-size: 13.5px; color: var(--text-dim); line-height: 1.6; }

    /* CTA */
    .cta-section {
      text-align: center;
      padding: 40px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      animation: fadeUp 0.6s 0.65s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .cta-section h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
    .cta-section p { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 24px; line-height: 1.6; }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 36px;
      background: var(--gradient);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(46, 97, 254, 0.3);
    }

    .cta-btn:hover {
      opacity: 0.92;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(46, 97, 254, 0.4);
    }

    /* ── Footer ────────────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 20px 24px;
      font-size: 10.5px;
      color: #333;
      position: relative;
      z-index: 1;
    }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .header { padding: 16px 18px; }
      .q-screen { padding: 24px 12px 40px; }
      .q-container { padding: 36px 24px; border-radius: 18px; }
      .q-text { font-size: 1.25rem; }
      .q-counter { top: 16px; right: 20px; }
      .lead-card { padding: 32px 24px; }
      .lead-fields { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: 1fr; }
      .report { padding: 24px 14px 40px; }
      .score-ring-wrap { width: 140px; height: 140px; }
      .score-number { font-size: 2.2rem; }
      .header-badge { display: none; }
    }
  </style>
</head>

<body>
  <div class="top-bar"><div class="top-bar-fill" id="topBar" style="width:0%"></div></div>
  <canvas id="bgCanvas"></canvas>

  <div class="shell">
    <header class="header">
      <img src="./assets/logo-white.png" alt="Trivox AI" style="height:26px;width:auto;" />
      <div class="header-badge">Automation Audit</div>
    </header>
    <div id="app"></div>
    <div class="footer">Trivox AI &middot; AI Automation Audit &middot; Confidential</div>
  </div>

  <script>
    // ── Questions ──────────────────────────────────────────────────
    const QUESTIONS = [
      {
        id: 'industry',
        text: 'What industry are you in and how many full-time employees do you have?',
        placeholder: 'e.g. Real estate brokerage, 12 full-time employees',
        hint: 'This helps us benchmark against similar businesses in your space.',
        type: 'input',
      },
      {
        id: 'leads',
        text: 'How many leads or inquiries does your business receive per month, and how are they currently handled?',
        placeholder: 'e.g. About 200 leads/month via website forms and phone calls, handled manually by 2 staff',
        hint: 'Include all channels: phone, email, forms, social media, walk-ins.',
        type: 'textarea',
      },
      {
        id: 'followUp',
        text: 'What does your follow-up process look like after a new lead comes in? How many manual steps are involved?',
        placeholder: 'e.g. Someone checks the inbox, copies info to a spreadsheet, then sends an email — usually takes 2-4 hours',
        hint: 'Be specific about the steps and time delays.',
        type: 'textarea',
      },
      {
        id: 'dataEntry',
        text: 'How many hours per week does your team spend on data entry, copy-paste tasks, or moving information between tools?',
        placeholder: 'e.g. About 15 hours per week across the team',
        hint: 'Estimate the total across all team members.',
        type: 'input',
      },
      {
        id: 'tools',
        text: 'What software tools does your business currently use?',
        placeholder: 'e.g. HubSpot CRM, Gmail, Google Sheets, Calendly, QuickBooks',
        hint: 'CRM, email, spreadsheets, booking, invoicing — list everything your team uses daily.',
        type: 'textarea',
      },
      {
        id: 'onboarding',
        text: 'Do you have a defined onboarding process for new clients? How many manual touchpoints does it involve?',
        placeholder: 'e.g. Yes — welcome email, intake form, 3 follow-up calls, contract signing. About 8 manual steps.',
        hint: 'Include any manual emails, calls, document sharing, or data collection.',
        type: 'textarea',
      },
      {
        id: 'scheduling',
        text: 'How do you currently handle appointment scheduling, reminders, and no-shows?',
        placeholder: 'e.g. We use Calendly for booking but reminders and no-show follow-ups are done manually',
        hint: 'Mention how often no-shows happen and how they\'re handled.',
        type: 'textarea',
      },
      {
        id: 'communication',
        text: 'How much of your customer communication is done manually vs automated?',
        placeholder: 'e.g. About 90% manual — we send individual emails for everything',
        hint: 'Think about emails, follow-ups, status updates, and routine messages.',
        type: 'textarea',
      },
      {
        id: 'revenue',
        text: 'What is your average monthly revenue, and what is your average deal or transaction size?',
        placeholder: 'e.g. ~$80,000/month revenue, average deal size is $2,500',
        hint: 'This helps us project the financial impact of automation.',
        type: 'input',
      },
      {
        id: 'bottleneck',
        text: 'What is the single biggest bottleneck or time drain in your business right now?',
        placeholder: 'e.g. Lead response time — we lose deals because we take too long to respond',
        hint: 'What keeps you up at night operationally?',
        type: 'textarea',
      },
    ];

    const LOADING_MESSAGES = [
      'Scanning your operations',
      'Calculating automation potential',
      'Mapping process inefficiencies',
      'Building your custom report',
      'Identifying quick wins',
    ];

    // ── State ──────────────────────────────────────────────────────
    const state = {
      view: 'quiz',
      step: 0,
      answers: {},
      lead: {},
      report: null,
    };

    const app = document.getElementById('app');
    const topBar = document.getElementById('topBar');

    // ── Progress Bar ───────────────────────────────────────────────
    function updateProgress() {
      if (state.view === 'quiz') {
        topBar.style.width = ((state.step + 1) / QUESTIONS.length * 100) + '%';
      } else if (state.view === 'lead') {
        topBar.style.width = '100%';
      }
    }

    // ── Render Question ────────────────────────────────────────────
    function renderQuestion() {
      state.view = 'quiz';
      updateProgress();

      const q = QUESTIONS[state.step];
      const prev = state.answers[q.id] || '';
      const isTextarea = q.type === 'textarea';
      const num = String(state.step + 1).padStart(2, '0');

      app.innerHTML = `
        <div class="q-screen">
          <div class="q-container view-enter">
            <div class="q-counter"><span class="cur">${num}</span> / ${QUESTIONS.length}</div>
            <div class="q-text">${q.text}</div>
            <div class="q-input-wrap">
              ${isTextarea
                ? `<textarea class="q-input" id="qInput" placeholder="${q.placeholder}" rows="4">${escHTML(prev)}</textarea>`
                : `<input class="q-input" id="qInput" type="text" placeholder="${q.placeholder}" />`
              }
            </div>
            ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
            <div class="q-actions">
              ${state.step > 0 ? '<button class="btn-back" onclick="prevStep()">Back</button>' : ''}
              <button class="btn-next" id="nextBtn" onclick="nextStep()">
                ${state.step === QUESTIONS.length - 1 ? 'Continue' : 'Next'}
              </button>
            </div>
          </div>
        </div>
      `;

      const input = document.getElementById('qInput');
      if (!isTextarea) input.value = prev;
      setTimeout(() => input.focus(), 100);

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && !isTextarea) {
          e.preventDefault();
          nextStep();
        }
      });
    }

    function nextStep() {
      const q = QUESTIONS[state.step];
      const val = document.getElementById('qInput').value.trim();
      if (!val) {
        const el = document.getElementById('qInput');
        el.style.borderColor = 'rgba(239, 68, 68, 0.5)';
        el.style.boxShadow = '0 0 0 3px rgba(239, 68, 68, 0.08)';
        return;
      }
      state.answers[q.id] = val;

      if (state.step < QUESTIONS.length - 1) {
        state.step++;
        renderQuestion();
      } else {
        renderLeadForm();
      }
    }

    function prevStep() {
      const q = QUESTIONS[state.step];
      state.answers[q.id] = document.getElementById('qInput').value.trim();
      if (state.step > 0) {
        state.step--;
        renderQuestion();
      }
    }

    // ── Lead Form ──────────────────────────────────────────────────
    function renderLeadForm() {
      state.view = 'lead';
      updateProgress();

      app.innerHTML = `
        <div class="lead-screen">
          <div class="lead-card view-enter">
            <div class="lead-icon">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00F0FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <h2>Your Audit Is Ready</h2>
            <div class="sub">Where should we send the insights?</div>

            <div class="lead-fields">
              <div class="lf">
                <label>Full Name *</label>
                <input type="text" id="leadName" placeholder="John Smith" />
              </div>
              <div class="lf">
                <label>Business Name *</label>
                <input type="text" id="leadBiz" placeholder="Acme Corp" />
              </div>
              <div class="lf full">
                <label>Email Address *</label>
                <input type="email" id="leadEmail" placeholder="john@acme.com" />
              </div>
              <div class="lf full">
                <label>Phone (optional)</label>
                <input type="tel" id="leadPhone" placeholder="+1 (555) 000-0000" />
              </div>
            </div>

            <div class="lead-submit">
              <button class="btn-next" onclick="submitAudit()">Generate My Audit Report</button>
            </div>
            <div class="lead-back">
              <button onclick="state.step=${QUESTIONS.length - 1}; renderQuestion();">Back to questions</button>
            </div>
          </div>
        </div>
      `;
    }

    // ── Submit ─────────────────────────────────────────────────────
    async function submitAudit() {
      const name = document.getElementById('leadName').value.trim();
      const biz = document.getElementById('leadBiz').value.trim();
      const email = document.getElementById('leadEmail').value.trim();
      const phone = document.getElementById('leadPhone').value.trim();

      let hasError = false;
      [['leadName', name], ['leadBiz', biz], ['leadEmail', email]].forEach(([id, val]) => {
        const el = document.getElementById(id);
        if (!val) {
          el.style.borderColor = 'rgba(239, 68, 68, 0.5)';
          el.style.boxShadow = '0 0 0 3px rgba(239, 68, 68, 0.08)';
          hasError = true;
        }
      });
      if (hasError) return;

      state.lead = { name, businessName: biz, email, phone };
      renderLoading();

      try {
        const auditData = {
          lead: state.lead,
          answers: QUESTIONS.map(q => ({
            question: q.text,
            answer: state.answers[q.id] || 'Not answered',
          })),
        };

        const res = await fetch('/api/audit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(auditData),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }

        const report = await res.json();
        state.report = report;
        renderReport();
      } catch (err) {
        renderError(err.message);
      }
    }

    // ── Loading ────────────────────────────────────────────────────
    function renderLoading() {
      state.view = 'loading';
      topBar.style.width = '0%';

      app.innerHTML = `
        <div class="loading-overlay view-enter">
          <div class="scan-lines">
            <div class="scan-line"></div>
            <div class="scan-line"></div>
            <div class="scan-line"></div>
          </div>
          <div class="loading-pulse"><div class="inner-dot"></div></div>
          <div class="loading-status" id="loadStatus">${LOADING_MESSAGES[0]}</div>
          <div class="loading-sub">Analyzing ${QUESTIONS.length} responses against industry benchmarks</div>
          <div class="loading-progress"><div class="loading-progress-fill" id="loadFill" style="width:0%"></div></div>
        </div>
      `;

      let idx = 0;
      window._loadingInterval = setInterval(() => {
        idx++;
        if (idx < LOADING_MESSAGES.length) {
          document.getElementById('loadStatus').textContent = LOADING_MESSAGES[idx];
          document.getElementById('loadFill').style.width = (idx / LOADING_MESSAGES.length * 100) + '%';
        } else {
          document.getElementById('loadFill').style.width = '95%';
          clearInterval(window._loadingInterval);
        }
      }, 2500);
    }

    // ── Error ──────────────────────────────────────────────────────
    function renderError(msg) {
      state.view = 'error';
      if (window._loadingInterval) clearInterval(window._loadingInterval);

      app.innerHTML = `
        <div class="error-screen view-enter">
          <div class="error-card">
            <div class="error-icon">!</div>
            <h2>Something went wrong</h2>
            <p>${escHTML(msg)}</p>
            <button class="btn-next" style="width:100%;margin-bottom:12px" onclick="submitAudit()">Try Again</button>
            <button class="btn-back" style="width:100%" onclick="renderLeadForm()">Back to Form</button>
          </div>
        </div>
      `;
    }

    // ── Report (PRESERVED — do not modify) ─────────────────────────
    function renderReport() {
      state.view = 'report';
      if (window._loadingInterval) clearInterval(window._loadingInterval);
      topBar.style.width = '100%';

      const r = state.report;
      const score = r.overallScore || 0;
      const circumference = 2 * Math.PI * 80; // ~502
      const offset = circumference - (score / 100) * circumference;

      const areaLabels = {
        leadManagement: 'Lead Management',
        clientOnboarding: 'Client Onboarding',
        scheduling: 'Scheduling & Reminders',
        communication: 'Communication',
        dataOperations: 'Data Operations',
      };

      app.innerHTML = `
        <div class="report">

          <!-- Score Hero -->
          <div class="score-hero">
            <div class="score-ring-wrap">
              <svg viewBox="0 0 180 180">
                <defs>
                  <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2E61FE"/>
                    <stop offset="100%" stop-color="#00F0FF"/>
                  </linearGradient>
                </defs>
                <circle class="score-ring-bg" cx="90" cy="90" r="80"/>
                <circle class="score-ring-fill" id="scoreRing" cx="90" cy="90" r="80"/>
              </svg>
              <div class="score-center">
                <div class="score-number" id="scoreNum">0</div>
                <div class="score-of">/ 100</div>
              </div>
            </div>
            <div class="score-label">${escHTML(r.scoreLabel || '')}</div>
            <div class="score-summary">${escHTML(r.summary || '')}</div>
          </div>

          <!-- KPI Row -->
          <div class="kpi-row">
            <div class="kpi-card">
              <div class="kpi-value">${r.weeklyHoursSaved || 0}h</div>
              <div class="kpi-label">Weekly Hours Saved</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-value">$${formatNum(r.annualROI || 0)}</div>
              <div class="kpi-label">Projected Annual ROI</div>
            </div>
            <div class="kpi-card">
              <div class="kpi-value">${r.paybackPeriodMonths || 0}mo</div>
              <div class="kpi-label">Payback Period</div>
            </div>
          </div>

          <!-- Area Scores -->
          <div class="areas-section">
            <div class="section-title"><div class="dot"></div> Automation Area Breakdown</div>
            <div class="area-bars">
              ${Object.entries(r.areaScores || {}).map(([key, val]) => `
                <div class="area-row">
                  <div class="area-row-top">
                    <span class="area-name">${areaLabels[key] || key}</span>
                    <span class="area-score-num">${val}/100</span>
                  </div>
                  <div class="area-track">
                    <div class="area-fill" data-width="${val}" style="width:0%"></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Top Opportunities -->
          <div class="opps-section">
            <div class="section-title"><div class="dot"></div> Top Automation Opportunities</div>
            <div class="opp-cards">
              ${(r.topProcesses || []).map(p => `
                <div class="opp-card">
                  <div class="opp-card-top">
                    <span class="opp-name">${escHTML(p.name)}</span>
                    <div class="opp-badges">
                      <span class="badge badge-${p.difficulty === 'Easy' ? 'easy' : p.difficulty === 'Medium' ? 'medium' : 'complex'}">${escHTML(p.difficulty)}</span>
                      <span class="badge badge-${p.impact === 'High' ? 'high' : p.impact === 'Medium' ? 'med-impact' : 'low'}">${escHTML(p.impact)} Impact</span>
                    </div>
                  </div>
                  <div class="opp-hours">${p.hoursSaved}h saved per week</div>
                  <div class="opp-desc">${escHTML(p.description)}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Quick Wins -->
          <div class="wins-section">
            <div class="section-title"><div class="dot"></div> Quick Wins — Implement This Week</div>
            <div class="wins-list">
              ${(r.quickWins || []).map((w, i) => `
                <div class="win-item">
                  <div class="win-bullet">${i + 1}</div>
                  <div class="win-text">${escHTML(w)}</div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- CTA -->
          <div class="cta-section">
            <h3>Ready to Automate?</h3>
            <p>Book a free strategy call with Trivox AI and we'll build your custom automation roadmap.</p>
            <a class="cta-btn" href="mailto:daniel@trivox.ca?subject=Automation%20Audit%20-%20${encodeURIComponent(state.lead.businessName || '')}&body=${encodeURIComponent('Hi Daniel,\n\nI just completed the Trivox AI Automation Audit and scored ' + score + '/100. I\'d love to book a strategy call to discuss automation opportunities for ' + (state.lead.businessName || 'my business') + '.\n\nBest,\n' + (state.lead.name || ''))}">
              Book Your Free Strategy Call
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
          </div>

        </div>
      `;

      // Animate score ring
      requestAnimationFrame(() => {
        const ring = document.getElementById('scoreRing');
        if (ring) ring.style.strokeDashoffset = offset;
      });

      // Animate score number
      animateNum('scoreNum', score, 1200);

      // Animate area bars
      setTimeout(() => {
        document.querySelectorAll('.area-fill').forEach(el => {
          el.style.width = el.dataset.width + '%';
        });
      }, 300);
    }

    // ── Utilities ──────────────────────────────────────────────────
    function escHTML(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatNum(n) {
      if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
      return n.toLocaleString();
    }

    function animateNum(id, target, duration) {
      const el = document.getElementById(id);
      if (!el) return;
      const start = performance.now();
      function step(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(target * ease);
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ── Background Particles ───────────────────────────────────────
    (function() {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let w, h, particles = [];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      function initParticles() {
        particles = [];
        const count = Math.floor((w * h) / 10000);
        for (let i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 1.2 + 0.3,
            a: Math.random() * 0.19 + 0.06,
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);
        particles.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = (i % 2 === 0) ? `rgba(46, 97, 254, ${p.a})` : `rgba(0, 240, 255, ${p.a})`;
          ctx.fill();
        });

        // Draw faint connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = dx * dx + dy * dy;
            if (dist < 12000) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(46, 97, 254, ${0.06 * (1 - dist / 12000)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(draw);
      }

      resize();
      initParticles();
      draw();
      window.addEventListener('resize', () => { resize(); initParticles(); });
    })();

    // ── Boot ───────────────────────────────────────────────────────
    renderQuestion();
  </script>
</body>
</html>
